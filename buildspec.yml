version: 0.2
phases:
  build:
    commands:
      - IMAGE_URI=$(cat imageDetail.json | python3 -c "import sys,json;print(json.load(sys.stdin)['ImageURI'])")
      - IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:latest && printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$IMAGE_URI" > imagedefinitions.json
      - cat imagedefinitions.json
artifacts:
  files:
    - imagedefinitions.json
